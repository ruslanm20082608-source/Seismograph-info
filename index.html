<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismo Monitor Pro</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #121212; color: #00e5ff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .container { background: #1e1e1e; padding: 15px; border-radius: 12px; display: inline-block; width: 100%; max-width: 900px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        #status { color: #888; font-size: 0.9em; margin-bottom: 10px; font-weight: bold; }
        .chart-box { position: relative; height: 400px; width: 100%; }
        h2 { font-size: 1.2em; margin: 5px 0; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>СЕЙСМОГРАФ LIVE</h2>
        <div id="status">Подключение...</div>
        <div class="chart-box">
            <canvas id="seismoChart"></canvas>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const ctx = document.getElementById('seismoChart').getContext('2d');

        // 1. Настройка графика с фиксированным масштабом
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(300).fill(""), // Сразу создаем 300 пустых точек
                datasets: [{
                    data: Array(300).fill(0),
                    borderColor: '#00e5ff',
                    backgroundColor: 'rgba(0, 229, 255, 0.05)',
                    borderWidth: 1.5,
                    fill: true,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { display: false },
                    y: { 
                        // МАСШТАБИРОВАНИЕ (измените эти числа, если график слишком мелкий или крупный)
                        min: 6, 
                        max: 9,
                        grid: { color: '#252525' }, 
                        ticks: { color: '#666' } 
                    }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 2. Настройки подключения
        const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';
        const options = {
            clientId: 'web_seismo_' + Math.random().toString(16).slice(2, 8),
            clean: true,
            connectTimeout: 5000
        };

        const client = mqtt.connect(brokerUrl, options);

        client.on('connect', () => {
            statusText.innerText = "СВЯЗЬ УСТАНОВЛЕНА (Масштаб ±5)";
            statusText.style.color = "#00ff00";
            client.subscribe('my_seismo/data');
        });

        client.on('message', (topic, message) => {
            const value = parseFloat(message.toString());
            
            // Добавляем новое значение и удаляем старое
            chart.data.datasets[0].data.push(value);
            chart.data.datasets[0].data.shift();
            
            // Быстрое обновление без анимации
            chart.update('none');
            
            statusText.innerText = "ДАННЫЕ: " + value.toFixed(2);
            statusText.style.color = "#00ff00";
        });

        client.on('error', (err) => {
            statusText.innerText = "Ошибка: " + err;
            statusText.style.color = "#ff4444";
        });

        client.on('offline', () => {
            statusText.innerText = "Оффлайн. Переподключение...";
            statusText.style.color = "#ffa500";
        });
    </script>
</body>
</html>
