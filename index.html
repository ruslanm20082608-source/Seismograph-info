<script>
    const statusText = document.getElementById('status');
    const ctx = document.getElementById('seismoChart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Ускорение Z',
                data: [],
                borderColor: '#00e5ff',
                backgroundColor: 'rgba(0, 229, 255, 0.05)', // Сделал фон прозрачнее
                borderWidth: 1.5, // Линия чуть тоньше для четкости
                fill: true,
                tension: 0.2, // Меньше сглаживания для точности пиков
                pointRadius: 0 // ТОЧКИ СКРЫТЫ, чтобы не было "каши"
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            elements: { line: { capBezierPoints: false } }, // Оптимизация скорости
            scales: {
                x: { display: false },
                y: { 
                    grid: { color: '#252525' }, 
                    ticks: { color: '#666', font: { size: 10 } } 
                }
            },
            plugins: { legend: { display: false } }
        }
    });

    const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';
    const options = {
        clientId: 'web_user_' + Math.random().toString(16).slice(2, 8),
        clean: true,
        connectTimeout: 4000
    };

    const client = mqtt.connect(brokerUrl, options);

    client.on('connect', () => {
        statusText.innerText = "СВЯЗЬ УСТАНОВЛЕНА. Масштаб: 300 точек";
        statusText.style.color = "#00ff00";
        client.subscribe('my_seismo/data');
    });

    client.on('message', (topic, message) => {
        const value = parseFloat(message.toString());
        
        chart.data.labels.push("");
        chart.data.datasets[0].data.push(value);

        // ТЕПЕРЬ ХРАНИМ 300 ТОЧЕК (График станет в 5 раз плотнее)
        if (chart.data.labels.length > 300) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.update('none'); // 'none' отключает внутренние анимации для скорости
    });

    client.on('offline', () => {
        statusText.innerText = "Оффлайн. Переподключение...";
        statusText.style.color = "#ffa500";
    });
</script>
