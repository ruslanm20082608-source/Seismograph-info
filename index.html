<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismo Monitor Online</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #121212; color: #00e5ff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; display: inline-block; width: 100%; max-width: 800px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 5px; font-size: 1.5em; }
        #status { color: #aaa; margin-bottom: 20px; font-weight: bold; }
        .chart-box { position: relative; height: 350px; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1>СЕЙСМОГРАФ ОНЛАЙН</h1>
        <div id="status">Инициализация...</div>
        <div class="chart-box">
            <canvas id="seismoChart"></canvas>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status');
        const ctx = document.getElementById('seismoChart').getContext('2d');

        // 1. Настройка графика
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Ускорение Z',
                    data: [],
                    borderColor: '#00e5ff',
                    backgroundColor: 'rgba(0, 229, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#333' }, ticks: { color: '#888' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // 2. Настройки подключения (как на проверочном сайте)
        const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';
        const options = {
            clientId: 'web_user_' + Math.random().toString(16).slice(2, 8),
            clean: true,
            connectTimeout: 4000
        };

        statusText.innerText = "Установка связи с брокером...";

        // 3. Запуск подключения
        const client = mqtt.connect(brokerUrl, options);

        client.on('connect', () => {
            statusText.innerText = "СВЯЗЬ УСТАНОВЛЕНА. Жду данные от ESP...";
            statusText.style.color = "#00ff00";
            client.subscribe('my_seismo/data');
        });

        client.on('message', (topic, message) => {
            statusText.innerText = "ДАННЫЕ ПОСТУПАЮТ LIVE";
            statusText.style.color = "#00ff00";
            
            const value = parseFloat(message.toString());
            
            // Добавляем данные в график
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(value);

            // Ограничиваем количество точек на экране (последние 60)
            if (chart.data.labels.length > 60) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        });

        client.on('error', (err) => {
            statusText.innerText = "Ошибка: " + err;
            statusText.style.color = "#ff4444";
        });

        client.on('offline', () => {
            statusText.innerText = "Сервер недоступен (Offline). Переподключение...";
            statusText.style.color = "#ffa500";
        });

    </script>
</body>
</html>
