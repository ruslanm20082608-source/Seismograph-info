
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Seismo Online</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; }
        .container { width: 95%; max-width: 800px; margin: 20px auto; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        h1 { color: #00e5ff; }
        #status { color: #aaa; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Сейсмограф</h1>
        <p id="status">Загрузка скриптов...</p>
        <canvas id="seismoChart" style="height:400px;"></canvas>
    </div>
    <script>
        const statusText = document.getElementById('status');
        const ctx = document.getElementById('seismoChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Z-axis', data: [], borderColor: '#00e5ff', borderWidth: 2, fill: true, tension: 0.3 }] },
            options: { animation: false, scales: { x: { display: false } } }
        });

        const client = new Paho.MQTT.Client("broker.hivemq.com", 443, "cl_" + Math.random().toString(16).substr(2, 5));

        client.onMessageArrived = (msg) => {
            statusText.innerText = "Данные идут";
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(parseFloat(msg.payloadString));
            if (chart.data.labels.length > 50) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        };

        client.connect({
            onSuccess: () => { statusText.innerText = "Подключено. Жду ESP..."; client.subscribe("my_seismo/data"); },
            onFailure: (e) => { statusText.innerText = "Ошибка: " + e.errorMessage; },
            useSSL: true
        });

        client.onConnectionLost = () => { statusText.innerText = "Связь прервана"; };
    </script>
</body>
</html>
