
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seismo Monitor Tree Mode</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body {
        background: #0f0f0f;
        color: #00e5ff;
        font-family: sans-serif;
        text-align: center;
        margin: 0;
        padding: 15px;
    }

    .container {
        background: #1c1c1c;
        padding: 15px;
        border-radius: 12px;
        max-width: 900px;
        margin: auto;
        box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    #status {
        font-size: 0.9em;
        margin-bottom: 10px;
        color: #888;
        font-weight: bold;
    }

    .chart-box {
        position: relative;
        height: 420px;
        width: 100%;
    }

    h2 {
        margin: 5px 0;
        font-size: 1.2em;
        letter-spacing: 1px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>🌲 SEISMOGRAPH TREE MODE</h2>
    <div id="status">Подключение...</div>

    <div class="chart-box">
        <canvas id="seismoChart"></canvas>
    </div>
</div>

<script>
const statusText = document.getElementById('status');
const ctx = document.getElementById('seismoChart').getContext('2d');

// 📊 стартовые данные
const DATA_SIZE = 300;

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(DATA_SIZE).fill(""),
        datasets: [{
            data: Array(DATA_SIZE).fill(0),
            borderColor: '#00e5ff',
            backgroundColor: 'rgba(0, 229, 255, 0.25)',
            borderWidth: 1.5,
            fill: 'origin',        // 🌲 ключевой эффект "ёлочки"
            tension: 0.05,
            pointRadius: 0
        }]
    },

    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,

        scales: {
            x: {
                display: false
            },

            y: {
                min: -2,
                max: 2,  // ⚠️ симметрия = красивый сейсмо-вид
                grid: { color: '#222' },
                ticks: { color: '#666' }
            }
        },

        plugins: {
            legend: { display: false }
        }
    }
});


// 📡 MQTT подключение
const brokerUrl = 'wss://broker.hivemq.com:8884/mqtt';

const client = mqtt.connect(brokerUrl, {
    clientId: 'seismo_' + Math.random().toString(16).slice(2, 8),
    clean: true,
    connectTimeout: 5000
});

client.on('connect', () => {
    statusText.innerText = "🟢 ONLINE (Tree Mode активен)";
    statusText.style.color = "#00ff88";
    client.subscribe('my_seismo/data');
});

client.on('message', (topic, message) => {

    // 📊 сигнал
    let value = parseFloat(message.toString());

    // ⚡ усиление сигнала (делает "горы" заметнее)
    value = value * 3;

    // 🔇 фильтр шума
    if (Math.abs(value) < 0.02) value = 0;

    const data = chart.data.datasets[0].data;

    data.push(value);
    data.shift();

    chart.update('none');

    statusText.innerText = "📡 VALUE: " + value.toFixed(3);
});

client.on('error', (err) => {
    statusText.innerText = "❌ ERROR: " + err;
    statusText.style.color = "#ff4444";
});

client.on('offline', () => {
    statusText.innerText = "🟠 OFFLINE - reconnecting...";
    statusText.style.color = "#ffa500";
});
</script>

</body>
</html>
